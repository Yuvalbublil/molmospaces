services:
  simulation:
    build: .
    image: yuvalbublil/molmospaces:1.0
    environment:
      - MUJOCO_GL=egl
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=graphics,compute,utility
    volumes:
      - molmo_resources:/root/.cache/molmo-spaces-resources
      - molmo_assets:/root/.cache/molmospaces
      - model_weights:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    command: .venv/bin/python scripts/datagen/run_pipeline.py --seed 3

  # Viewer with noVNC: open http://localhost:6080/vnc.html in your browser.
  # Uses GPU (EGL rendering) when an NVIDIA GPU is available.
  simulation-viewer:
    build: .
    image: yuvalbublil/molmospaces:1.0
    ports:
      - "6080:6080"
    environment:
      - MUJOCO_GL=egl
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=graphics,compute,utility
    volumes:
      - molmo_resources:/root/.cache/molmo-spaces-resources
      - molmo_assets:/root/.cache/molmospaces
      - model_weights:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    command: vglrun -d egl .venv/bin/python scripts/datagen/run_pipeline.py --viewer --seed 3

volumes:
  molmo_resources:
  molmo_assets:
  model_weights:
